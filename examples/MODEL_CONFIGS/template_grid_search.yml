# Root defaults compose settings shared by every model-selection method.
defaults:
  - dataset: mnist
  - resources: cpu
  - reproducibility: default
  - data_loading: torch
  - experiment: default
  - _self_

# Values in this file override defaults because _self_ is last.
experiment:
  exp_name: my_grid_experiment

grid:
  # Search-local defaults compose model/training choices inside grid only.
  defaults:
    - optimizer:
        - adam
        - adagrad
    - search/mlp@_here_
    - _self_
  model: mlwiz.model.MLP
  checkpoint: true
  shuffle: true
  batch_size: 512
  epochs: 100
  dim_embedding:
    - 32
    - 64
