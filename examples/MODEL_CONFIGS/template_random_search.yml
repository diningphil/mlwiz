defaults:
  - dataset: mnist
  - resources: cpu
  - reproducibility: default
  - data_loading: torch
  - experiment: default
  - _self_

experiment:
  exp_name: my_random_experiment

random:
  defaults:
    - optimizer: random_adam
    - search/random_mlp@_here_
    - _self_
  budget: 20
  model: mlwiz.model.MLP
  checkpoint: true
  shuffle: true
  batch_size:
    sample_method: mlwiz.evaluation.util.choice
    args:
      - 256
      - 512
  epochs: 100
  dim_embedding:
    sample_method: mlwiz.evaluation.util.randint
    args:
      - 16
      - 128
