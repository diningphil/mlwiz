defaults:
  - dataset: mnist
  - resources: cpu
  - reproducibility: default
  - data_loading: torch
  - experiment: default
  - _self_

experiment:
  exp_name: my_bayesian_experiment

bayes:
  defaults:
    - optimizer: bayes_adam
    - search/bayes_mlp@_here_
    - _self_
  budget: 20
  random_starts: 5
  candidate_pool_size: 256
  ei_xi: 0.001
  model: mlwiz.model.MLP
  checkpoint: true
  shuffle: true
  batch_size:
    sample_method: mlwiz.evaluation.util.choice
    args:
      - 256
      - 512
  epochs: 100
  dim_embedding:
    sample_method: mlwiz.evaluation.util.randint
    args:
      - 16
      - 128
