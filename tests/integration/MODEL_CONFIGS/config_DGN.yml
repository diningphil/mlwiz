defaults:
  - dataset: fake_nci1
  - resources: cpu
  - reproducibility: default
  - data_loading: pyg
  - experiment: default
  - _self_
experiment:
  exp_name: dgn
grid:
  defaults:
    - optimizer: adam
    - search/classification@_here_
    - _self_
  model: mlwiz.model.DGN
  checkpoint: true
  shuffle: true
  batch_size: 512
  epochs: 2
  dim_embedding: 5
  num_layers: 2
  is_graph_classification: true
  is_single_graph: false
