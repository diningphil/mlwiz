defaults:
  - dataset: fake_mnist
  - resources: cpu
  - reproducibility: default
  - data_loading: torch
  - experiment: default
  - _self_
experiment:
  exp_name: mlp
  model_selection_training_runs: 2
grid:
  defaults:
    - optimizer: adam
    - search/mlp@_here_
    - _self_
  model: mlwiz.model.MLP
  checkpoint: true
  shuffle: true
  batch_size: 512
  epochs: 2
  dim_embedding: 5
  mlwiz_tests: true
