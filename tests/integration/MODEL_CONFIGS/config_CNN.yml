defaults:
  - dataset: fake_mnist
  - resources: cpu
  - reproducibility: default
  - data_loading: torch
  - experiment: default
  - _self_
experiment:
  exp_name: cnn
grid:
  defaults:
    - optimizer: adam
    - search/classification@_here_
    - _self_
  model: mlwiz.model.CNN
  checkpoint: true
  shuffle: true
  batch_size: 512
  epochs: 2
  readout: mlwiz.model.readout.graph_readout.LinearGraphReadout
