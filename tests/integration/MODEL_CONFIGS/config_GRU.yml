defaults:
  - dataset: fake_mnist_temporal
  - resources: cpu
  - reproducibility: default
  - data_loading: torch
  - experiment: default
  - _self_
experiment:
  exp_name: gru
grid:
  defaults:
    - optimizer: adam
    - search/classification@_here_
    - _self_
  model: mlwiz.model.GRU
  checkpoint: true
  shuffle: true
  batch_size: 512
  epochs: 2
  dim_embedding: 5
  engine:
    - class_name: mlwiz.training.engine.TrainingEngine
      args:
        eval_training:
          - true
