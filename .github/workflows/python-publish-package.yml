# This workflow uploads a Python package when a release is created.

name: Publish Package  # build + publish to PyPI (and update badges)

on:
  release:
    types: [published]
  workflow_dispatch:  # manual release run

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    uses: ./.github/workflows/python-test-and-coverage.yml
    with:
      generate_badges: true

  deploy:
    needs: tests

    permissions:
      contents: write
      actions: read
      pull-requests: write

    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install build dependencies
        run: uv pip install --system build twine

      - name: Build package
        run: |
          python -m build
          python -m twine check --strict dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Checkout default branch for badge commit
        uses: actions/checkout@v7
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0

      - name: Download badges artifact
        uses: actions/download-artifact@v8
        with:
          name: badges
          path: .tmp-badges

      - name: Place badges in repo
        run: |
          mkdir -p .badges
          cp .tmp-badges/*.svg .badges/

      - name: Open badge update pull request
        env:
          BADGE_BRANCH: chore/update-badges
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git pull --ff-only origin "${DEFAULT_BRANCH}"
          git fetch origin \
            "refs/heads/${BADGE_BRANCH}:refs/remotes/origin/${BADGE_BRANCH}" \
            || true
          git switch -c "${BADGE_BRANCH}"
          git add .badges/coverage_badge.svg .badges/interrogate_badge.svg

          if git diff --cached --quiet; then
            echo "No badge changes."
            exit 0
          fi

          git commit -m "chore: update badges"
          git push --force-with-lease origin "${BADGE_BRANCH}"

          pr_number="$(gh pr list \
            --base "${DEFAULT_BRANCH}" \
            --head "${BADGE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" \
              --title "chore: update badges" \
              --body "Updates the generated coverage and docstring badges."
            echo "Updated existing badge PR #${pr_number}."
          else
            gh pr create \
              --base "${DEFAULT_BRANCH}" \
              --head "${BADGE_BRANCH}" \
              --title "chore: update badges" \
              --body "Updates the generated coverage and docstring badges."
          fi
