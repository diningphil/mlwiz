name: CI  # lint + test matrix

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:  # manual runs from the Actions tab
  workflow_call:  # reusable workflow (used by release/publish pipeline)
    inputs:
      generate_badges:
        description: Generate and upload badge SVGs as an artifact
        type: boolean
        required: false
        default: false

permissions:
  contents: read  # checkout only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}  # one run per ref
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install lint dependencies
        run: uv pip install --system flake8

      - name: Lint with flake8
        run: >
          flake8 .
          --count
          --select=E9,F63,F7,F82
          --max-line-length=79
          --show-source
          --statistics

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # When requested, run a single version to generate coverage+badges once.
        python-version: ${{ fromJSON(inputs.generate_badges && '["3.11"]' || '["3.10","3.11","3.12","3.13"]') }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install --system -e . pytest

      - name: Install badge tooling
        if: ${{ inputs.generate_badges && matrix.python-version == '3.11' }}
        run: >
          uv pip install --system
          coverage==7.4.4
          coverage-badge
          "interrogate[png]"
          cairosvg

      - name: Run tests (coverage)
        if: ${{ inputs.generate_badges && matrix.python-version == '3.11' }}
        run: |
          mkdir -p .badges
          coverage run -m pytest -q
          coverage report -m
          coverage-badge -o .badges/coverage_badge.svg -f

      - name: Interrogate badge
        if: ${{ inputs.generate_badges && matrix.python-version == '3.11' }}
        run: interrogate --generate-badge .badges mlwiz

      - name: Upload badges
        if: ${{ inputs.generate_badges && matrix.python-version == '3.11' }}
        uses: actions/upload-artifact@v7
        with:
          name: badges
          path: .badges/*.svg
          include-hidden-files: true
          if-no-files-found: error

      - name: Run tests
        if: ${{ !(inputs.generate_badges && matrix.python-version == '3.11') }}
        run: pytest -q
